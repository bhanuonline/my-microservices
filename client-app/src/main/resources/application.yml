server:
  port: 8097

spring:
  security:
    oauth2:
      client:
        registration:
          demo-client:
            client-id: demo-client
            client-secret: secret
            scope: openid,read
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          demo-client:
            issuer-uri: http://127.0.0.1:8095