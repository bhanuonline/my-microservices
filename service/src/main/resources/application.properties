spring.application.name=myservice
app.title=Base App
server.error.include-message=always
server.port=8093

#DB Property
spring.datasource.url=jdbc:mysql://localhost:3306/servicedb
#For docker use
#spring.datasource.url=jdbc:mysql://host.docker.internal:3307/servicedb

spring.datasource.username=root
#For docker use
#spring.datasource.password=root
spring.datasource.password=pass1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#profile set if blank then application.properties
spring.profiles.active=

#spring security
spring.security.enabled=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/retail

logging.level.JWT-ROLE-MAPPER=DEBUG

# Enable debug logging for the API key filter
logging.level.com.example.service.filter.ApiKeyFilter=DEBUG


# Optional: Spring Security logging
logging.level.org.springframework.security=DEBUG

