version: '3.8'

services:
  mysql-shard-1:
    image: mysql:8.0
    container_name: mysql-shard-1
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: urlshortener
    ports:
      - "3311:3306"
    volumes:
      - shard1_data:/var/lib/mysql

  mysql-shard-2:
    image: mysql:8.0
    container_name: mysql-shard-2
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: urlshortener
    ports:
      - "3312:3306"
    volumes:
      - shard2_data:/var/lib/mysql

  mysql-shard-3:
    image: mysql:8.0
    container_name: mysql-shard-3
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: urlshortener
    ports:
      - "3313:3306"
    volumes:
      - shard3_data:/var/lib/mysql

  mysql-shard-4:
    image: mysql:8.0
    container_name: mysql-shard-4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: urlshortener
    ports:
      - "3314:3306"
    volumes:
      - shard4_data:/var/lib/mysql
  redis-cache:
    image: redis:7.2
    container_name: redis-cache
    ports:
      - "6379:6379"

volumes:
  shard1_data:
  shard2_data:
  shard3_data:
  shard4_data: